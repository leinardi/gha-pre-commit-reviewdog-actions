name: "Validate commit messages via conventional-pre-commit"
description: "Checks every non-merge commit in a PR diff range against the Conventional Commits spec"
author: "leinardi"
branding:
  icon: "git-commit"
  color: "blue"

inputs:
  from-ref:
    description: "Base git ref (e.g., PR base SHA)"
    required: true
  to-ref:
    description: "Head git ref (e.g., PR head SHA)"
    required: true

outputs:
  exitcode:
    description: "Exit code of the conventional-pre-commit validation (0 = all commits pass)"
    value: ${{ steps.validate_commits.outputs.exitcode }}

runs:
  using: "composite"
  steps:
    - name: Cache pre-commit
      uses: actions/cache@v6
      with:
        path: ~/.cache/pre-commit
        key: pre-commit|${{ runner.os }}|${{ hashFiles('.pre-commit-config.yaml') }}

    - name: Install pre-commit
      shell: bash
      run: |
        pip install --no-cache-dir pre-commit

    - name: Validate commit messages
      id: validate_commits
      shell: bash
      run: |
        set -uo pipefail
        if ! git log --format='%H' "${{ inputs.from-ref }}..${{ inputs.to-ref }}" >/dev/null 2>&1; then
          echo "::error::Failed to get commit log for range '${{ inputs.from-ref }}..${{ inputs.to-ref }}'. Ensure 'fetch-depth: 0' is used on actions/checkout."
          exit 1
        fi
        failed=0
        while read -r sha parents; do
          # Skip merge commits (more than one parent SHA)
          [ "$(echo "$parents" | wc -w)" -gt 1 ] && continue
          msg_file="$(mktemp)"
          git log -1 --format=%B "$sha" > "$msg_file"
          if ! pre-commit run conventional-pre-commit \
                 --hook-stage commit-msg \
                 --commit-msg-filename "$msg_file" \
                 --color=never 2>&1; then
            short_sha="$(git log -1 --format=%h "$sha")"
            subject="$(git log -1 --format=%s "$sha")"
            echo "::error::Commit $short_sha has a non-conventional message: $subject"
            failed=1
          fi
          rm -f "$msg_file"
        done < <(git log --format='%H %P' "${{ inputs.from-ref }}..${{ inputs.to-ref }}")
        echo "exitcode=$failed" >> "$GITHUB_OUTPUT"
        exit "$failed"
